<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azaan - Prayer Times PWA</title>
    <link rel="manifest" href="manifest.json">
    <link href="style.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors">
    <div class="container mx-auto p-4">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-white">Azaan Times</h1>
            <div class="flex justify-center items-center mt-4 space-x-4">
                <button id="locationBtn" class="bg-blue-500 text-white px-4 py-2 rounded-lg">
                    📍 Get Location
                </button>
                <button id="themeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700">
                    🌓
                </button>
            </div>
        </header>

        <!-- Prayer Times List -->
        <div id="prayerTimes" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
            <!-- Dynamic content loaded from JS -->
        </div>

        <!-- Settings Panel -->
        <div class="mt-8 p-4 bg-white dark:bg-gray-800 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4 dark:text-white">Settings</h2>
            <div class="space-y-4">
                <div class="flex items-center">
                    <input type="checkbox" id="darkMode" class="mr-2">
                    <label for="darkMode" class="dark:text-white">Dark Mode</label>
                </div>
                <!-- More settings -->
            </div>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="azaanPlayer" hidden></audio>
</body>
</html>
