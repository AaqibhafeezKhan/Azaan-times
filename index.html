<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3B82F6">
    <title>Azaan Times - Prayer PWA</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 transition-colors duration-300">
    <div class="container mx-auto p-4 min-h-screen">
        <!-- Loading Overlay -->
        <div id="loading" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-4 text-gray-600 dark:text-gray-300">Loading prayer times...</p>
        </div>

        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-white mb-2">🕌 Azaan Times</h1>
            <div class="flex justify-center gap-2">
                <button id="locationBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
                    <i class="fas fa-location-arrow mr-2"></i>Get Location
                </button>
                <button id="themeToggle" class="p-2 rounded-lg bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 transition">
                    <i class="fas fa-moon text-gray-800 dark:text-white"></i>
                </button>
            </div>
        </header>

        <!-- Prayer Times Grid -->
        <div id="prayerTimes" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>

        <!-- Manual Location Input -->
        <div id="manualLocation" class="hidden mt-6 p-4 bg-white dark:bg-gray-800 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4 dark:text-white">Manual Location</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="lat" placeholder="Latitude" step="0.0001" 
                    class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                <input type="number" id="lng" placeholder="Longitude" step="0.0001"
                    class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                <button onclick="useManualLocation()" 
                    class="col-span-2 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition">
                    Use Manual Coordinates
                </button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="mt-8 p-4 bg-white dark:bg-gray-800 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4 dark:text-white"><i class="fas fa-cog mr-2"></i>Settings</h2>
            <div class="space-y-4">
                <div class="flex items-center">
                    <input type="checkbox" id="darkMode" class="w-4 h-4 mr-2">
                    <label for="darkMode" class="dark:text-white">Dark Mode</label>
                </div>
                <div class="flex flex-col">
                    <label class="dark:text-white mb-2">Azaan Audio:</label>
                    <select id="audioSelect" class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="mecca">Mecca Style</option>
                        <option value="madinah">Madinah Style</option>
                        <option value="egypt">Egypt Style</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Audio Element -->
        <audio id="azaanPlayer" hidden></audio>
    </div>

    <script src="/script.js"></script>
</body>
</html>
